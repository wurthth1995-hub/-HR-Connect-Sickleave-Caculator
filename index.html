<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คำนวณสิทธิวันลาพักร้อน</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <main class="w-full max-w-5xl mx-auto">
        <!-- ================= CALCULATOR SECTION ================= -->
        <section class="content-section fade-in">
            <!-- Header -->
            <div class="flex items-center gap-3 mb-6 sm:mb-8 pb-4 border-b border-gray-200">
                <div class="p-3 sm:p-4 rounded-2xl bg-gradient-to-br from-red-600 to-red-800 text-white shadow-lg">
                    <i data-lucide="calculator" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                </div>
                <div>
                    <h2 class="text-xl sm:text-3xl font-extrabold text-gray-800">คำนวณสิทธิวันลาพักร้อน</h2>
                    <p class="text-sm sm:text-base text-gray-500 mt-1">ตรวจสอบสิทธิตามอายุงานและนโยบายบริษัท</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
                <!-- Input Panel -->
                <div class="lg:col-span-1 bg-white p-6 sm:p-8 rounded-2xl shadow-lg border-t-4 border-red-700 w-full flex flex-col justify-between">
                    <div>
                        <label class="block text-base font-bold text-gray-700 mb-2">ระบุวันที่เริ่มงาน</label>
                        <input type="date" id="start-date" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all mb-6 text-gray-700" onchange="calculateLeave()">
                        
                        <div class="bg-gray-50 p-5 rounded-xl border border-gray-100 text-sm space-y-3">
                            <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                                <span class="font-semibold text-gray-500">วันนี้:</span> 
                                <span id="current-date-display" class="text-gray-800 font-medium">-</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-semibold text-gray-500">อายุงาน:</span> 
                                <span id="tenure-display" class="text-red-600 font-bold text-base">-</span>
                            </div>
                        </div>
                    </div>

                    <button onclick="calculateLeave()" class="w-full mt-6 bg-red-700 text-white py-3.5 rounded-xl font-bold hover:bg-red-800 transition-colors shadow-md active:transform active:scale-95 flex justify-center items-center gap-2">
                        <i data-lucide="calendar-check" class="w-5 h-5"></i> คำนวณสิทธิ
                    </button>
                </div>

                <!-- Result Panel -->
                <div class="lg:col-span-2 bg-white p-6 sm:p-10 rounded-2xl shadow-lg border border-gray-100 flex flex-col justify-center items-center text-center min-h-[350px] w-full" id="result-container">
                    
                    <!-- Default State (ยังไม่ใส่วันที่) -->
                    <div id="result-placeholder" class="text-center p-6 fade-in">
                        <div class="bg-gray-50 p-5 rounded-full inline-block mb-4 border border-gray-100 shadow-sm">
                            <i data-lucide="calendar-search" class="w-16 h-16 text-gray-300"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-600">กรุณาระบุวันที่เริ่มงาน</h3>
                        <p class="text-sm text-gray-400 mt-2">ระบบจะคำนวณสิทธิวันลาตามระเบียบให้คุณอัตโนมัติ</p>
                    </div>

                    <!-- Result State (แสดงผลลัพธ์) -->
                    <div id="result-content" class="hidden w-full max-w-lg mx-auto fade-in">
                        <div class="mb-3">
                            <span class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider" id="status-badge"></span>
                        </div>
                        <h3 class="text-5xl sm:text-6xl font-extrabold text-gray-800 mb-2 tracking-tight">
                            <span id="leave-days" class="text-red-600">0</span> <span class="text-2xl sm:text-3xl font-bold text-gray-500">วัน</span>
                        </h3>
                        <p class="text-gray-500 mb-8 font-medium">สิทธิวันหยุดพักผ่อนประจำปีของคุณ</p>
                        
                        <div class="bg-red-50 rounded-xl p-5 text-left border-l-4 border-red-600 shadow-sm">
                            <h4 class="font-bold text-red-800 mb-2 flex items-center gap-2 text-lg">
                                <i data-lucide="info" class="w-5 h-5"></i> รายละเอียดการคำนวณ
                            </h4>
                            <p id="calculation-detail" class="text-base text-red-700 leading-relaxed"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // สร้าง Icon จาก Lucide
            lucide.createIcons();
            
            // จำกัดให้เลือกวันที่ได้สูงสุดแค่วันปัจจุบัน
            const dateInput = document.getElementById('start-date');
            if(dateInput) {
                const today = new Date().toISOString().split('T')[0];
                dateInput.max = today;
            }
        });

        function calculateLeave() {
            const startDateInput = document.getElementById('start-date').value;
            if (!startDateInput) return;

            const startDate = new Date(startDateInput);
            const today = new Date();
            
            // เซ็ตเวลาให้เป็นเที่ยงคืนตรง เพื่อการคำนวณวันที่แม่นยำ
            startDate.setHours(0, 0, 0, 0); 
            today.setHours(0, 0, 0, 0);

            // ตรวจสอบกรณีเลือกวันที่ในอนาคต
            if (startDate > today) {
                document.getElementById('result-placeholder').classList.add('hidden');
                document.getElementById('result-content').classList.remove('hidden');
                document.getElementById('tenure-display').innerText = "-";
                
                const resultBadge = document.getElementById('status-badge');
                resultBadge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-red-100 text-red-700";
                resultBadge.innerText = "วันที่ไม่ถูกต้อง";
                
                const leaveEl = document.getElementById('leave-days');
                leaveEl.innerText = "0"; 
                leaveEl.className = "text-gray-400";
                
                document.getElementById('calculation-detail').innerHTML = "วันที่เริ่มงานต้องไม่เกินวันปัจจุบัน";
                return;
            }
            
            // คำนวณจำนวนวันทำงานและอายุงาน (ปี)
            let diffTime = Math.abs(today - startDate);
            let daysWorked = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            let tenureYears = daysWorked / 365.25;
            
            // คำนวณ ปี/เดือน สำหรับแสดงผลสวยงาม
            let y = today.getFullYear() - startDate.getFullYear();
            let m = today.getMonth() - startDate.getMonth();
            let d = today.getDate() - startDate.getDate();
            if (d < 0) { m--; d += 30; }
            if (m < 0) { y--; m += 12; }
            
            // อัปเดต UI ส่วนข้อมูลตั้งต้น
            document.getElementById('current-date-display').innerText = today.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('tenure-display').innerText = `${y} ปี ${m} เดือน`;
            
            // สลับสถานะ UI
            document.getElementById('result-placeholder').classList.add('hidden');
            document.getElementById('result-content').classList.remove('hidden');

            const resultBadge = document.getElementById('status-badge');
            const leaveDaysEl = document.getElementById('leave-days');
            const detailEl = document.getElementById('calculation-detail');

            let leaveDays = 0; 
            let message = ""; 
            let badgeClass = ""; 
            let badgeText = "";

            // Logic การคำนวณสิทธิวันลา (อิงตามต้นฉบับ)
            if (daysWorked <= 119) {
                // ยังไม่พ้นทดลองงาน
                leaveDays = 0; 
                badgeClass = "bg-gray-100 text-gray-700"; 
                badgeText = "อยู่ในช่วงทดลองงาน";
                message = `อายุงาน ${daysWorked} วัน (ยังไม่พ้นทดลองงาน 119 วัน) จึงยังไม่มีสิทธิหยุดพักร้อนตามระเบียบ`;
            } else if (tenureYears < 1) {
                // อายุงานไม่ถึง 1 ปี (Pro-rate)
                let rawLeave = (daysWorked / 365) * 14;
                leaveDays = Math.round(rawLeave * 2) / 2; // ปัดเศษทีละครึ่งวัน (0.5)
                if (leaveDays > 14) leaveDays = 14;
                
                badgeClass = "bg-orange-100 text-orange-700"; 
                badgeText = "สิทธิแบบเฉลี่ย (Pro-rate)";
                
                // อัปเดตการแสดงผลสูตร Pro-rate
                message = `
                    คำนวณสิทธิแบบเฉลี่ยตามสัดส่วนวันทำงาน<br>
                    <div class="bg-white/60 p-3 rounded-lg mt-3 mb-2 border border-red-100 text-sm font-medium text-gray-800 shadow-sm">
                        <span class="text-gray-500 block mb-1 text-xs">สูตรคำนวณ: (จำนวนวันทำงาน ÷ 365 วัน) × 14 วัน</span>
                        (${daysWorked} ÷ 365) × 14 = <span class="text-red-700 font-bold">${rawLeave.toFixed(2)} วัน</span>
                    </div>
                    ปัดเศษตามระเบียบได้รับสิทธิจริง <strong>${leaveDays} วัน</strong>
                `;
            } else {
                // อายุงานเกิน 1 ปี
                badgeClass = "bg-green-100 text-green-700";
                if (tenureYears < 2) { 
                    leaveDays = 14; 
                    badgeText = "อายุงาน 1 ปี แต่ไม่ถึง 2 ปี"; 
                    message = "คุณได้รับสิทธิวันหยุดพักผ่อนประจำปีเต็มจำนวน 14 วัน"; 
                } else if (tenureYears < 5) { 
                    leaveDays = 17; 
                    badgeText = "อายุงาน 2 ปี ถึง 5 ปี"; 
                    message = "คุณได้รับสิทธิวันหยุดพักผ่อนประจำปี 17 วัน"; 
                } else { 
                    leaveDays = 19; 
                    badgeText = "อายุงาน 5 ปีขึ้นไป / ระดับบริหาร"; 
                    message = "คุณได้รับสิทธิวันหยุดพักผ่อนประจำปีสูงสุด 19 วัน"; 
                }
            }

            // แสดงผลลัพธ์ลง UI
            resultBadge.className = `px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${badgeClass}`;
            resultBadge.innerText = badgeText;
            leaveDaysEl.innerText = leaveDays;
            
            // เปลี่ยนสีตัวเลขหากเป็น 0 ให้เป็นสีเทา
            document.getElementById('leave-days').className = leaveDays > 0 ? "text-red-600" : "text-gray-400"; 
            detailEl.innerHTML = message;
        }
    </script>
</body>
</html>
